name: Build and Push Docker Images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag name (e.g. backend-v0.5.0 or frontend-v0.5.0)"
        required: true
        type: string

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      version: ${{ steps.set-matrix.outputs.version }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.event.inputs.tag_name }}"
          fi
          
          VERSION="${TAG#*-v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          if [[ "$TAG" == backend-v* ]]; then
            echo 'matrix={"include":[{"service":"rag-backend","context":".","dockerfile":"apps/backend/Dockerfile"}]}' >> $GITHUB_OUTPUT
          elif [[ "$TAG" == frontend-v* ]]; then
            echo 'matrix={"include":[{"service":"rag-frontend","context":"apps/frontend","dockerfile":"Dockerfile"}]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"include":[{"service":"rag-backend","context":".","dockerfile":"apps/backend/Dockerfile"},{"service":"rag-frontend","context":"apps/frontend","dockerfile":"Dockerfile"}]}' >> $GITHUB_OUTPUT
          fi

  build-and-push:
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: odest/${{ matrix.service }}
          tags: |
            type=raw,value=${{ needs.resolve.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          sbom: true
          provenance: mode=max

      - name: Run Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves,sbom
          image: odest/${{ matrix.service }}:${{ needs.resolve.outputs.version }}
          dockerhub-user: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: odest/${{ matrix.service }}
          readme-filepath: ./DOCKERHUB.md
