services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DOCLING_DEVICE=cpu
      - HF_HOME=/app/models/hf
    command: litestar --app app.main:app run --host 0.0.0.0 --port 8000 --debug --reload
    volumes:
      - .:/app
      - /app/.venv
      - hf-models-cache:/app/models/hf
      - rapidocr-models-cache:/app/.venv/lib/python3.14/site-packages/rapidocr/models
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  hf-models-cache:
  rapidocr-models-cache:
