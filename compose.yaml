services:
  redis:
    image: rag-ingestion-pipeline-redis
    build:
      context: .
      dockerfile_inline: |
        FROM redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DOCLING_DEVICE=cpu
      - HF_HOME=/workspace/models/hf
    command: litestar --app apps.backend.app.main:app run --host 0.0.0.0 --port 8000 --debug --reload --reload-dir apps/backend
    volumes:
      - .:/workspace
      - /workspace/.venv
      - hf-models-cache:/workspace/models/hf
      - rapidocr-models-cache:/workspace/.venv/lib/python3.14/site-packages/rapidocr/models
      - shared-storage:/workspace/storage
    working_dir: /workspace
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      - DOCLING_DEVICE=cpu
      - HF_HOME=/workspace/models/hf
    command: taskiq worker apps.backend.app.core.broker:broker apps.backend.app.features.document_parsing.tasks --reload --reload-dir apps/backend
    volumes:
      - .:/workspace
      - /workspace/.venv
      - hf-models-cache:/workspace/models/hf
      - rapidocr-models-cache:/workspace/.venv/lib/python3.14/site-packages/rapidocr/models
      - shared-storage:/workspace/storage
    working_dir: /workspace
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  hf-models-cache:
  rapidocr-models-cache:
  redis-data:
  shared-storage:
