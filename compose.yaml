name: rag-ingestion-pipeline

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    image: odest/rag-backend:0.8.0
    ports:
      - "8000:8000"
    environment:
      - DOCLING_DEVICE=cpu
      - HF_HOME=/workspace/models/hf
    command: litestar --app apps.backend.app.main:app run --host 0.0.0.0 --port 8000
    volumes:
      - hf-models-cache:/workspace/models/hf
      - rapidocr-models-cache:/workspace/.venv/lib/python3.14/site-packages/rapidocr/models
      - shared-storage:/workspace/storage
    working_dir: /workspace
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  worker:
    image: odest/rag-backend:0.8.0
    environment:
      - DOCLING_DEVICE=cpu
      - HF_HOME=/workspace/models/hf
      - OMP_NUM_THREADS=3
    command: >-
      taskiq worker apps.backend.app.core.broker:broker
      apps.backend.app.features.parse_document.tasks
      apps.backend.app.features.chunk_document.tasks
      apps.backend.app.features.embed_document.tasks
      apps.backend.app.features.index_document.tasks
      --workers 2 --max-async-tasks 1 --max-prefetch 1
    volumes:
      - hf-models-cache:/workspace/models/hf
      - rapidocr-models-cache:/workspace/.venv/lib/python3.14/site-packages/rapidocr/models
      - shared-storage:/workspace/storage
    working_dir: /workspace
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    image: odest/rag-frontend:0.8.0
    ports:
      - "3000:8080"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  hf-models-cache:
  rapidocr-models-cache:
  redis-data:
  shared-storage:
