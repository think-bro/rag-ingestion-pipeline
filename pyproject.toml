[tool.uv.workspace]
members = ["apps/*"]

[dependency-groups]
dev = [
    "ruff>=0.15.17",
    "ty>=0.0.49",
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cpu" }
torchvision = { index = "pytorch-cpu" }
